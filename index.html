<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project : Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="calculator.js" defer></script>
</head>
<body>
    <h1>Calculator Project</h1>
    <div class="calculator-body">
        <input class="calculator-screen" size="4">
        <div class="calculator-buttons">
            <div class="operators-and-symbols">
                <button class="operator add">+</button>
                <button class="operator subtract">-</button>
                <button class="operator multiply">x</button>
                <button class="operator divide">÷</button>
                <button class="operator clear">AC</button>
            </div>
            <div class="numbers">
            </div>
        </div>
    </div> 
</body>
</html>
